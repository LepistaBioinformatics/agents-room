appId: com.agentsroom.app
productName: Agents Room
copyright: Copyright © 2026

directories:
  buildResources: build
  output: dist

files:
  - '!**/.vscode/*'
  - '!src/*'
  - '!electron.vite.config.*'
  - '!{.eslintignore,.eslintrc.cjs,.prettierignore,.prettierrc.yaml,dev-app-update.yml,CHANGELOG.md,README.md}'
  - '!{.env,.env.*,.npmrc,pnpm-lock.yaml}'
  - '!.specs/*'
  - '!docs/*'

asarUnpack:
  - resources/**

# Place a 1024×1024 PNG at build/icon.png — electron-builder generates
# platform-specific formats (.ico, .icns) automatically from it.

win:
  executableName: agents-room
  target:
    - target: nsis
      arch:
        - x64
        - arm64

nsis:
  artifactName: ${productName}-${version}-setup.${ext}
  shortcutName: ${productName}
  uninstallDisplayName: ${productName}
  createDesktopShortcut: always
  oneClick: false
  allowToChangeInstallationDirectory: true

linux:
  target:
    - target: AppImage
      arch:
        - x64
        - arm64
    - target: deb
      arch:
        - x64
        - arm64
    - target: rpm
      arch:
        - x64
  maintainer: Agents Room <noreply@agentsroom.app>
  category: Utility

appImage:
  artifactName: ${productName}-${version}.${ext}

npmRebuild: false

publish:
  provider: github
  releaseType: release
